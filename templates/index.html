<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>IndexTech_ Poker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* --- TEMA INDEX TECH --- */
        body {
            margin: 0;
            background: radial-gradient(circle at center, #151e32, #070a12); /* Fundo azul escuro tech */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Linhas geométricas ao fundo inspiradas no banner */
        .tech-bg-line {
            position: absolute;
            background: rgba(33, 150, 243, 0.05);
            z-index: 0;
        }
        .line-1 { width: 150vw; height: 2px; top: 30%; transform: rotate(-20deg); left: -20%; }
        .line-2 { width: 150vw; height: 2px; top: 70%; transform: rotate(15deg); left: -20%; }
        .line-3 { width: 2px; height: 150vh; left: 20%; transform: rotate(45deg); top: -20%; }

        /* TELA DE LOGIN ESTILO TERMINAL */
        #login-screen {
            position: absolute;
            background: rgba(11, 16, 26, 0.95);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            z-index: 100;
            border: 1px solid #2196F3;
            box-shadow: 0 0 30px rgba(33, 150, 243, 0.2);
        }

        .logo-text {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }
        .logo-text .index { color: #ffffff; }
        .logo-text .tech { color: #2196F3; }
        .logo-text .cursor { color: #2196F3; animation: blink 1s step-end infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }

        #login-screen input {
            padding: 12px;
            margin: 20px 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #1a253a;
            color: white;
            display: block;
            width: 250px;
            outline: none;
        }
        #login-screen input:focus { border-color: #2196F3; }

        #login-screen button {
            padding: 12px;
            margin: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            display: block;
            width: 276px;
            background: #2196F3;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        #login-screen button:hover { background: #1976D2; box-shadow: 0 0 15px #2196F3; }

        /* MESA DE POKER INDEX TECH */
        .table-container {
            position: relative;
            width: 950px;
            height: 480px;
            background: #121c2e; /* Feltro azul marinho */
            border: 12px solid #2196F3; /* Borda Azul Elétrico */
            border-radius: 240px;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8), 0 15px 40px rgba(0,0,0,0.6), 0 0 30px rgba(33, 150, 243, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* LOGO GIGANTE COMO MARCA D'ÁGUA NO FELTRO */
        .table-watermark {
            position: absolute;
            font-size: 120px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            z-index: 0;
            pointer-events: none;
            letter-spacing: -4px;
        }
        .table-watermark span { color: rgba(33, 150, 243, 0.05); }

        .center-area {
            text-align: center;
            z-index: 5;
        }

        .pot {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 25px;
            border-radius: 20px;
            border: 1px solid #2196F3;
            color: #90caf9;
            display: inline-block;
            box-shadow: 0 0 10px rgba(33, 150, 243, 0.2);
        }

        .community-cards {
            display: flex;
            gap: 12px;
            justify-content: center;
            min-height: 110px;
            min-width: 400px;
        }

        .card {
            width: 75px;
            height: 110px;
            background: white;
            color: black;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            position: relative;
        }

        .red-suit { color: #d91c1c; }

        .player-seat {
            position: absolute;
            background: #162032;
            border: 2px solid #334155;
            border-radius: 8px;
            width: 140px;
            height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            z-index: 20;
        }

        .player-seat .name { font-weight: bold; margin-bottom: 4px; color: #fff; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .player-seat .chips { color: #64b5f6; font-weight: bold; }
        .player-seat .bet-tag { font-size: 11px; background: #0d47a1; color: white; padding: 2px 6px; border-radius: 4px; margin-top: 3px; border: 1px solid #1976D2;}

        /* Posições distribuídas ao redor da mesa */
        .pos-0 { bottom: -35px; left: 50%; transform: translateX(-50%); border-color: #2196F3; } 
        .pos-1 { bottom: 40px; left: -40px; }
        .pos-2 { top: 50%; left: -85px; transform: translateY(-50%); }
        .pos-3 { top: 40px; left: -40px; }
        .pos-4 { top: -35px; left: 50%; transform: translateX(-50%); }
        .pos-5 { top: 40px; right: -40px; }
        .pos-6 { top: 50%; right: -85px; transform: translateY(-50%); }
        .pos-7 { bottom: 40px; right: -40px; }

        .action-panel {
            position: absolute;
            bottom: -110px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }

        .action-panel button {
            background: #1e293b;
            color: white;
            border: 1px solid #475569;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-panel button:hover { background: #334155; transform: translateY(-2px); }
        .action-panel button.fold { border-color: #ef4444; color: #fca5a5; }
        .action-panel button.call { border-color: #3b82f6; color: #93c5fd; }
        .action-panel button.raise { border-color: #10b981; color: #6ee7b7; }
        .action-panel button.allin { border-color: #f59e0b; color: #fcd34d; background: #451a03; }

        .my-cards {
            position: absolute;
            bottom: 25px;
            display: flex;
            gap: 8px;
            z-index: 10;
            transform: scale(0.75);
            transform-origin: bottom center;
            pointer-events: none;
        }

        #startBtn {
            position: absolute;
            top: -55px;
            background: #2196F3;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }
        #startBtn:hover { background: #1976D2; }
    </style>
</head>
<body>

    <div class="tech-bg-line line-1"></div>
    <div class="tech-bg-line line-2"></div>
    <div class="tech-bg-line line-3"></div>

    <div id="login-screen">
        <div class="logo-text"><span class="index">Index</span><span class="tech">Tech</span><span class="cursor">_</span></div>
        <p style="color: #94a3b8; margin-top: 5px;">Acesso ao Servidor de Poker</p>
        <input type="text" id="playerName" placeholder="Insira sua credencial (Nome)">
        <button onclick="joinGame()">Conectar à Mesa</button>
    </div>

    <div class="table-container" style="display: none;" id="game-screen">
        <div class="table-watermark">Index<span>Tech</span>_</div>

        <div class="center-area">
            <div class="pot">Pote Total: <span id="potAmount">0</span> MBs</div>
            <div class="community-cards" id="communityCards"></div>
        </div>
        
        <div id="players-container"></div>
        <div class="my-cards" id="myCards"></div>

        <div class="action-panel" id="actionPanel" style="display: none;">
            <button class="fold" onclick="sendAction('fold')">Desistir (Fold)</button>
            <button class="call" id="callBtn" onclick="sendAction('call')">Pedir Mesa / Pagar</button>
            <button class="raise" onclick="handleRaiseClick()">Aumentar (Raise)</button>
            <button class="allin" onclick="sendAction('all-in')">ALL-IN!</button>
        </div>
        
        <button id="startBtn" onclick="startGame()" style="display: none;">Iniciar Sessão (Dar as Cartas)</button>
    </div>

    <script>
        const socket = io();
        let myId = null;
        let localState = null;

        function joinGame() {
            const name = document.getElementById('playerName').value;
            if (!name) return alert("Por favor, insira um nome válido para conectar!");
            socket.emit('join_game', { name: name });
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
        }

        function startGame() {
            socket.emit('start_game');
        }

        function sendAction(action, amount=0) {
            socket.emit('player_action', { action: action, amount: amount });
        }

        function handleRaiseClick() {
            if (!localState) return;
            
            const p = localState.players[myId];
            const meuFichario = p.chips;
            const apostaMinimaAtual = localState.current_min_bet;
            const incrementoMinimo = 5;
            
            const valorInput = prompt(`🔵 PAINEL DE AUMENTO:\n\nA aposta atual está em ${apostaMinimaAtual}.\nO incremento mínimo é de ${incrementoMinimo} MBs.\nSeu saldo atual é de ${meuFichario} MBs.\n\nDigite APENAS o valor extra que deseja somar à aposta:`);
            
            if (valorInput !== null && valorInput.trim() !== "") {
                const acrescimo = parseInt(valorInput);
                
                if (isNaN(acrescimo)) {
                    alert("❌ Erro de input: Digite apenas números inteiros.");
                    return;
                }

                const novaApostaTotal = apostaMinimaAtual + acrescimo;
                
                if (acrescimo < incrementoMinimo && novaApostaTotal < (meuFichario + p.bet)) {
                    alert(`❌ Ação Bloqueada: Você precisa acrescentar no mínimo ${incrementoMinimo} MBs.`);
                } 
                else if (novaApostaTotal > (meuFichario + p.bet)) {
                    alert(`❌ Saldo Insuficiente: Você tentou aumentar em ${acrescimo} (Total: ${novaApostaTotal}), mas possui apenas ${meuFichario + p.bet}. Utilize a função ALL-IN.`);
                } 
                else {
                    sendAction('raise', novaApostaTotal);
                }
            }
        }

        socket.on('connect', () => { myId = socket.id; });

        socket.on('game_reset', (data) => {
            alert(data.msg);
            location.reload();
        });

        socket.on('show_winner', (data) => {
            alert(data.msg);
        });

        socket.on('error_msg', (data) => {
            alert(data.msg);
            location.reload();
        });

        socket.on('game_update', (state) => {
            localState = state;
            document.getElementById('potAmount').innerText = state.pot;
            
            const commCardsDiv = document.getElementById('communityCards');
            commCardsDiv.innerHTML = '';
            state.community_cards.forEach(card => {
                const isRed = card.naipe === '♥' || card.naipe === '♦';
                commCardsDiv.innerHTML += `<div class="card ${isRed ? 'red-suit' : ''}"><div>${card.valor}</div><div style="font-size:32px;">${card.naipe}</div></div>`;
            });
            
            const playersContainer = document.getElementById('players-container');
            playersContainer.innerHTML = '';
            
            const playerSids = Object.keys(state.players);
            
            if (state.phase === 'waiting' && playerSids.length >= 2) {
                document.getElementById('startBtn').style.display = 'block';
            } else {
                document.getElementById('startBtn').style.display = 'none';
            }

            // Lógica da Coroa
            let maxWealth = -1;
            playerSids.forEach(sid => {
                const wealth = state.players[sid].chips + state.players[sid].bet;
                if (wealth > maxWealth) {
                    maxWealth = wealth;
                }
            });
            
            let posIndex = 0;
            playerSids.forEach((sid) => {
                const p = state.players[sid];
                const seat = document.createElement('div');
                
                seat.className = `player-seat pos-${sid === myId ? 0 : posIndex + 1}`;
                
                let statusInfo = "";
                if (p.status === 'folded') statusInfo = "<span style='color:#ef4444;'>Folded</span>";
                else if (p.status === 'all-in') statusInfo = "<span style='color:#f59e0b;'>ALL-IN</span>";
                else if (p.bet > 0) statusInfo = `<span class="bet-tag">Apostou: ${p.bet}</span>`;

                const myWealth = p.chips + p.bet;
                let crownHtml = "";
                if (myWealth === maxWealth && maxWealth > 0) {
                    // Coroa centralizada no topo do jogador
                    crownHtml = "<div style='position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 32px; z-index: 999; text-shadow: 0px 0px 10px #2196F3, 0px 4px 4px rgba(0,0,0,0.8);'>👑</div>";
                }
                
                seat.innerHTML = `
                    ${crownHtml}
                    <span class="name">${p.name}</span>
                    <span class="chips">${p.chips} 💻</span>
                    ${statusInfo}
                `;
                
                // Brilho azul elétrico (IndexTech) para o turno ativo
                if (state.phase !== 'waiting' && state.turn_order[state.current_turn_index] === sid) {
                    seat.style.borderColor = '#2196F3';
                    seat.style.boxShadow = '0 0 25px rgba(33, 150, 243, 0.8)';
                    seat.style.transform = sid === myId ? 'translateX(-50%) scale(1.1)' : 'scale(1.1)';
                }

                playersContainer.appendChild(seat);
                
                if (sid === myId) {
                    const myCardsDiv = document.getElementById('myCards');
                    myCardsDiv.innerHTML = '';
                    p.cards.forEach(card => {
                        const isRed = card.naipe === '♥' || card.naipe === '♦';
                        myCardsDiv.innerHTML += `<div class="card ${isRed ? 'red-suit' : ''}"><div>${card.valor}</div><div style="font-size:32px;">${card.naipe}</div></div>`;
                    });

                    const btnCall = document.getElementById('callBtn');
                    if (btnCall) {
                        const betNeeded = state.current_min_bet - p.bet;
                        if (betNeeded > 0) {
                            btnCall.innerText = `Pagar (Call ${betNeeded})`;
                        } else {
                            btnCall.innerText = "Pedir Mesa (Check)";
                        }
                    }

                    const isMyTurn = state.turn_order[state.current_turn_index] === myId;
                    document.getElementById('actionPanel').style.display = (isMyTurn && state.phase !== 'waiting') ? 'flex' : 'none';
                }
                
                if (sid !== myId) posIndex++;
            });
        });
    </script>
</body>
</html>
